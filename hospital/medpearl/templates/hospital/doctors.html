{% extends 'hospital/base.html' %}
{% load static %}
{% block content %}
<h2 class="fw-bold text-center">Our Doctors</h2>
<div class="row justify-content-center">
    {% for doctor in doctors %}
        <div class="col-md-4 mb-3">
            <div class="card">
                {% if doctor.profile_pic %}
                  <img src="{{ doctor.profile_pic.url }}" class="card-img-top" alt="{{ doctor.name }}">
                {% else %}
                  <img src="{% static 'hospital/images/doctor3.jpg' %}" class="card-img-top" alt="{{ doctor.name }}">
                {% endif %}
                <div class="card-body">
                    <h5 class="card-title fw-bold">{{ doctor.name }}</h5>
                    <p class="card-text"><b>Speciality:</b> {{ doctor.speciality }}</p>
                    <a href="{% url 'doctor_profile' doctor.id %}" class="btn btn-primary">View Profile</a>
                </div>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
