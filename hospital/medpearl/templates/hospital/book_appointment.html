{% extends 'hospital/base.html' %}
{% block content %}
<h2 class="fw-bold text-center">Book Appointment</h2>
<form method="post" class="mx-auto shadow p-4 rounded" style="max-width:500px; background:#f6f8fb;">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
        <label class="form-label fw-bold">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <div class="text-danger small">{{ field.errors }}</div>
        {% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn btn-success w-100 fw-bold">Book Appointment</button>
</form>
{% endblock %}
